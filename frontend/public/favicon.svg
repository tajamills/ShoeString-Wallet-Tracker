<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#050505"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="96" height="96" fill="none" stroke="#1F1F22" stroke-width="4"/>
  
  <!-- Chart line going up - representing price tracking -->
  <polyline 
    points="15,70 30,60 45,65 60,40 75,45 85,25" 
    fill="none" 
    stroke="#00C805" 
    stroke-width="6" 
    stroke-linecap="square"
    stroke-linejoin="miter"
  />
  
  <!-- Data point dots -->
  <rect x="82" y="22" width="8" height="8" fill="#00C805"/>
  
  <!-- CT letters for CryptoTracker -->
  <text x="50" y="88" font-family="monospace" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">CT</text>
</svg>
